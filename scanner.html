<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ISBN 바코드 스캔</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#fff; font-family:-apple-system,sans-serif;
       height:100vh; display:flex; flex-direction:column; overflow:hidden; }

#header {
  position:fixed; top:0; left:0; right:0; z-index:10;
  padding:16px 20px;
  background:linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
  display:flex; justify-content:space-between; align-items:center;
}
#header span { font-size:16px; font-weight:600; }
#close-btn {
  background:rgba(255,255,255,0.2); border:none; color:#fff;
  border-radius:50%; width:36px; height:36px;
  font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
}

video {
  width:100%; height:100vh; object-fit:cover; display:block;
}

#overlay {
  position:fixed; inset:0; pointer-events:none;
  display:flex; align-items:center; justify-content:center;
}
#scan-box {
  width:75%; max-width:300px; height:120px;
  border:2px solid rgba(255,255,255,0.9); border-radius:10px;
  box-shadow:0 0 0 9999px rgba(0,0,0,0.55);
  position:relative; margin-top:-60px;
}
#scan-line {
  position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(to right, transparent, #5DCAA5, transparent);
  animation:scan 2s linear infinite;
}
@keyframes scan {
  0%   { top:0; }
  100% { top:100%; }
}

#status {
  position:fixed; bottom:80px; left:0; right:0;
  text-align:center; font-size:13px; color:rgba(255,255,255,0.8);
  padding:0 20px;
}

#result {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(15,110,86,0.95); padding:20px;
  transform:translateY(100%); transition:transform 0.3s;
  border-radius:16px 16px 0 0;
}
#result.show { transform:translateY(0); }
#result-title { font-size:15px; font-weight:600; margin-bottom:4px; }
#result-isbn  { font-size:12px; opacity:0.7; margin-bottom:14px; }
#result-btn {
  width:100%; padding:12px; background:#fff; color:#0F6E56;
  border:none; border-radius:10px; font-size:15px; font-weight:700;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="header">
  <span>📷 ISBN 바코드 스캔</span>
  <button id="close-btn" onclick="closeScanner()">✕</button>
</div>

<video id="video" playsinline autoplay muted></video>

<div id="overlay">
  <div id="scan-box">
    <div id="scan-line"></div>
  </div>
</div>

<div id="status">바코드를 사각형 안에 맞춰주세요</div>

<div id="result">
  <div id="result-title"></div>
  <div id="result-isbn"></div>
  <button id="result-btn" onclick="confirmScan()">이 책으로 등록하기</button>
</div>

<script>
const params   = new URLSearchParams(window.location.search);
const callback = params.get('callback') || '';
let detectedISBN = '';
let zxingControls = null;

// ZXing 로드
const script = document.createElement('script');
script.src = 'https://unpkg.com/@zxing/library@latest/umd/index.min.js';
script.onload  = startScan;
script.onerror = () => { document.getElementById('status').textContent = '라이브러리 로드 실패. 네트워크를 확인해주세요.'; };
document.head.appendChild(script);

function startScan() {
  const video = document.getElementById('video');
  const codeReader = new ZXing.BrowserMultiFormatReader();

  codeReader.decodeFromConstraints(
    { video: { facingMode: 'environment' } },
    video,
    (result, err) => {
      if (!result) return;
      const val = result.getText().replace(/-/g, '');
      if (val.length === 13 || val.length === 10) {
        if (val === detectedISBN) return; // 중복 방지
        detectedISBN = val;
        showResult(val);
      }
    }
  ).then(ctrl => {
    zxingControls = ctrl;
  }).catch(e => {
    document.getElementById('status').textContent =
      '카메라 오류: ' + e.name + '\n' +
      (e.name === 'NotAllowedError' ? '카메라 권한을 허용해주세요.' : e.message);
  });
}

function showResult(isbn) {
  document.getElementById('result-isbn').textContent  = 'ISBN: ' + isbn;
  document.getElementById('result-title').textContent = '✅ 바코드 인식됨';
  document.getElementById('result').classList.add('show');
}

function confirmScan() {
  if (!detectedISBN || !callback) return;
  // GAS 웹앱으로 ISBN 전달
  const url = decodeURIComponent(callback) + '?isbn=' + detectedISBN;
  window.location.href = url;
}

function closeScanner() {
  if (zxingControls) { try { zxingControls.stop(); } catch(e) {} }
  if (callback) {
    window.location.href = decodeURIComponent(callback);
  } else {
    window.close();
  }
}
</script>
</body>
</html>

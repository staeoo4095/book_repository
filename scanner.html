<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ISBN 바코드 스캔</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#fff; font-family:-apple-system,sans-serif;
       height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* ── 독자 선택 화면 ── */
#reader-screen {
  position:fixed; inset:0; background:#0F1F17; z-index:50;
  display:flex; flex-direction:column; padding:24px 20px; overflow-y:auto;
}
#reader-screen h2 { font-size:19px; font-weight:700; margin-bottom:6px; }
#reader-screen .sub { font-size:13px; color:rgba(255,255,255,0.6); margin-bottom:24px; }
.section-label { font-size:12px; font-weight:600; color:#5DCAA5; margin-bottom:10px; text-transform:uppercase; letter-spacing:0.05em; }
.reader-chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:22px; }
.reader-chip {
  padding:9px 16px; border-radius:20px; border:1.5px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.06); color:#fff; font-size:14px; cursor:pointer;
}
.reader-chip.on { background:#0F6E56; border-color:#0F6E56; font-weight:600; }
.add-reader-row { display:flex; gap:8px; margin-bottom:24px; }
.add-reader-row input {
  flex:1; padding:11px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.06); color:#fff; font-size:14px;
}
.add-reader-row input::placeholder { color:rgba(255,255,255,0.4); }
.add-reader-row button {
  padding:11px 16px; border-radius:10px; border:none; background:rgba(255,255,255,0.15);
  color:#fff; font-size:13px; cursor:pointer; flex-shrink:0;
}
#reader-date {
  width:100%; padding:12px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.06); color:#fff; font-size:15px; margin-bottom:28px;
  -webkit-appearance:none;
}
#start-scan-btn {
  width:100%; padding:15px; border:none; border-radius:12px; background:#0F6E56;
  color:#fff; font-size:16px; font-weight:700; cursor:pointer;
}
#start-scan-btn:disabled { background:rgba(255,255,255,0.15); color:rgba(255,255,255,0.4); }
#no-children-note {
  font-size:12px; color:#f5b74a; background:rgba(245,183,74,0.12); border-radius:8px;
  padding:10px 12px; margin-bottom:18px; line-height:1.6; display:none;
}

/* ── 스캔 화면 ── */
#scan-screen { display:none; flex:1; flex-direction:column; position:relative; }
#header {
  position:fixed; top:0; left:0; right:0; z-index:10;
  padding:14px 16px; background:linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
  display:flex; justify-content:space-between; align-items:center;
}
#header .title { font-size:14px; font-weight:600; }
#header .readers-label { font-size:11px; color:#5DCAA5; margin-top:2px; }
#close-btn {
  background:rgba(255,255,255,0.2); border:none; color:#fff;
  border-radius:50%; width:34px; height:34px;
  font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;
}

video { width:100%; height:100vh; object-fit:cover; display:block; }

#overlay { position:fixed; inset:0; pointer-events:none; display:flex; align-items:center; justify-content:center; }
#scan-box {
  width:75%; max-width:300px; height:110px;
  border:2px solid rgba(255,255,255,0.9); border-radius:10px;
  box-shadow:0 0 0 9999px rgba(0,0,0,0.55);
  position:relative; margin-top:-90px;
}
#scan-line {
  position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(to right, transparent, #5DCAA5, transparent);
  animation:scan 2s linear infinite;
}
@keyframes scan { 0% { top:0; } 100% { top:100%; } }

#db-status {
  position:fixed; top:66px; left:0; right:0;
  text-align:center; font-size:11px; color:rgba(93,202,165,0.9); padding:0 20px;
}

/* 수동 입력 */
#manual-entry {
  background:rgba(15,15,15,0.95); padding:12px 16px;
  border-top:1px solid rgba(255,255,255,0.1);
}
.manual-toggle {
  text-align:center; font-size:12px; color:rgba(255,255,255,0.6); padding:4px; cursor:pointer;
}
#manual-input-row { display:none; gap:8px; margin-top:8px; }
#manual-input-row input {
  flex:1; padding:11px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.08); color:#fff; font-size:15px;
}
#manual-input-row button {
  padding:11px 16px; border-radius:10px; border:none; background:#0F6E56; color:#fff;
  font-size:13px; font-weight:600; cursor:pointer; flex-shrink:0;
}

/* 스캔된 책 목록 패널 */
#bottom-stack {
  position:fixed; bottom:0; left:0; right:0; z-index:14;
  display:flex; flex-direction:column;
}
#scanned-panel {
  background:rgba(12,12,12,0.97); border-radius:16px 16px 0 0;
  max-height:44vh; display:flex; flex-direction:column;
}
#scanned-panel.collapsed .scanned-list { display:none; }
#scanned-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 16px; cursor:pointer;
}
#scanned-header .cnt { font-size:14px; font-weight:700; color:#5DCAA5; }
#scanned-header .toggle-arrow { font-size:14px; color:rgba(255,255,255,0.5); }
.scanned-list { overflow-y:auto; padding:0 16px 8px; }
.scanned-item {
  display:flex; align-items:center; gap:10px; padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.08); font-size:13px;
}
.scanned-item .info { flex:1; min-width:0; }
.scanned-item .t { font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.scanned-item .m { font-size:11px; color:rgba(255,255,255,0.5); margin-top:1px; }
.scanned-item .rm {
  background:none; border:none; color:rgba(255,255,255,0.5); font-size:18px; cursor:pointer;
  padding:2px 6px; flex-shrink:0;
}
#finish-btn-row { padding:10px 16px 16px; }
#finish-btn {
  width:100%; padding:14px; border:none; border-radius:12px; background:#0F6E56;
  color:#fff; font-size:15px; font-weight:700; cursor:pointer;
}
#finish-btn:disabled { background:rgba(255,255,255,0.15); color:rgba(255,255,255,0.4); }

#toast {
  position:fixed; top:100px; left:50%; transform:translateX(-50%);
  background:rgba(15,110,86,0.95); color:#fff; padding:9px 18px; border-radius:20px;
  font-size:13px; z-index:60; white-space:nowrap; display:none;
}
#toast.err { background:rgba(192,57,43,0.95); }
</style>
</head>
<body>

<!-- ══ 화면 1: 독자 선택 ══ -->
<div id="reader-screen">
  <h2>📷 바코드로 책 등록</h2>
  <div class="sub">먼저 누가 읽었는지 선택하고, 여러 권을 연속으로 스캔한 뒤 한 번에 등록하세요.</div>

  <div class="section-label">읽은 사람 (여러 명 선택 가능)</div>
  <div id="no-children-note">등록된 자녀가 없어요. 아래에서 이름을 입력해 추가하거나, 앱의 설정 탭에서 먼저 등록해주세요.</div>
  <div class="reader-chips" id="reader-chips"></div>
  <div class="add-reader-row">
    <input type="text" id="new-reader-input" placeholder="이름 직접 입력...">
    <button onclick="addManualReader()">추가</button>
  </div>

  <div class="section-label">읽은 날짜</div>
  <input type="date" id="reader-date">

  <button id="start-scan-btn" onclick="startScanSession()" disabled>스캔 시작</button>
</div>

<!-- ══ 화면 2: 스캔 ══ -->
<div id="scan-screen">
  <div id="header">
    <div>
      <div class="title">ISBN 바코드 스캔</div>
      <div class="readers-label" id="readers-label"></div>
    </div>
    <button id="close-btn" onclick="closeScanner()">✕</button>
  </div>

  <div id="db-status"></div>

  <video id="video" playsinline autoplay muted></video>

  <div id="overlay">
    <div id="scan-box"><div id="scan-line"></div></div>
  </div>

  <div id="bottom-stack">
    <div id="scanned-panel" class="collapsed">
      <div id="scanned-header" onclick="toggleScannedPanel()">
        <span class="cnt"><span id="scanned-count">0</span>권 담김</span>
        <span class="toggle-arrow" id="scanned-arrow">▲</span>
      </div>
      <div class="scanned-list" id="scanned-list"></div>
      <div id="finish-btn-row">
        <button id="finish-btn" onclick="finishSession()" disabled>완료 — <span id="finish-count">0</span>권 한번에 등록</button>
      </div>
    </div>

    <div id="manual-entry">
      <div class="manual-toggle" onclick="toggleManualEntry()">⌨️ 바코드가 안 읽히면 ISBN 직접 입력 <span id="manual-arrow">▾</span></div>
      <div id="manual-input-row">
        <input type="text" id="manual-isbn" inputmode="numeric" placeholder="ISBN 숫자 입력 (10자리 또는 13자리)">
        <button onclick="submitManualISBN()">조회</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const params   = new URLSearchParams(window.location.search);
const callback = params.get('callback') || '';
let   readerNames = [];
try { readerNames = JSON.parse(decodeURIComponent(params.get('children') || '[]')); } catch(e) { readerNames = []; }

const ALADIN_KEY  = 'ttbstaeoo1907001';
const ISBN_DB_URL = 'https://staeoo4095.github.io/book_repository/isbn_db.json';

// ── IndexedDB 캐싱 (기존과 동일) ───────────────────────────────────────────
const ISBN_DB_VERSION = 2;
const IDB_NAME  = 'isbn_cache_db';
const IDB_STORE = 'kv';

function idbOpen() {
  return new Promise((resolve, reject) => {
    if (!('indexedDB' in window)) { reject(new Error('IndexedDB 미지원')); return; }
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => { req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}
function idbGet(key) {
  return idbOpen().then(db => new Promise((resolve, reject) => {
    const tx  = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  }));
}
function idbSet(key, value) {
  return idbOpen().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror    = () => reject(tx.error);
  }));
}

let _isbnDB = null, _isbnDBLoading = false;
async function preloadISBNDB() {
  if (_isbnDB || _isbnDBLoading) return;
  _isbnDBLoading = true;
  const statusEl = document.getElementById('db-status');
  try {
    const cachedVersion = await idbGet('version');
    if (cachedVersion === ISBN_DB_VERSION) {
      const cachedData = await idbGet('data');
      if (cachedData) { _isbnDB = cachedData; _isbnDBLoading = false; return; }
    }
    if (statusEl) statusEl.textContent = '📚 도서 DB 준비 중...';
    const resp = await fetch(ISBN_DB_URL);
    const data = await resp.json();
    _isbnDB = data;
    if (statusEl) statusEl.textContent = '';
    idbSet('data', data).then(() => idbSet('version', ISBN_DB_VERSION)).catch(()=>{});
  } catch (e) {
    _isbnDB = {};
    if (statusEl) statusEl.textContent = '';
  } finally { _isbnDBLoading = false; }
}
preloadISBNDB();

// ── 독자 선택 화면 로직 ──────────────────────────────────────────────────────
let _selectedReaders = new Set();

function renderReaderChips() {
  const el = document.getElementById('reader-chips');
  el.innerHTML = readerNames.map(n =>
    `<div class="reader-chip ${_selectedReaders.has(n) ? 'on' : ''}" onclick="toggleReader('${n.replace(/'/g,"\\'")}')">${n}</div>`
  ).join('');
  document.getElementById('no-children-note').style.display = readerNames.length ? 'none' : 'block';
}

function toggleReader(name) {
  if (_selectedReaders.has(name)) _selectedReaders.delete(name);
  else _selectedReaders.add(name);
  renderReaderChips();
  updateStartBtn();
}

function addManualReader() {
  const input = document.getElementById('new-reader-input');
  const v = input.value.trim();
  if (!v) return;
  if (!readerNames.includes(v)) readerNames.push(v);
  _selectedReaders.add(v);
  input.value = '';
  renderReaderChips();
  updateStartBtn();
}
document.getElementById('new-reader-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); addManualReader(); }
});

function updateStartBtn() {
  document.getElementById('start-scan-btn').disabled = _selectedReaders.size === 0;
}

// 날짜 기본값: 오늘
(function() {
  const today = new Date();
  document.getElementById('reader-date').value = today.getFullYear() + '-' +
    String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
})();

renderReaderChips();

let _sessionDate = '';

function startScanSession() {
  if (_selectedReaders.size === 0) return;
  _sessionDate = document.getElementById('reader-date').value;
  document.getElementById('readers-label').textContent =
    [..._selectedReaders].join(', ') + ' · ' + _sessionDate;
  document.getElementById('reader-screen').style.display = 'none';
  document.getElementById('scan-screen').style.display = 'flex';
  loadZXingAndStart();
}

// ── 스캔된 책 목록 ────────────────────────────────────────────────────────
let _scannedBooks = []; // [{isbn,title,author,publisher,stage,pageCount}]
let _scannedISBNs = new Set();

function toast(msg, isErr) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = isErr ? 'err' : '';
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display = 'none', 2200);
}

function toggleScannedPanel() {
  const panel = document.getElementById('scanned-panel');
  panel.classList.toggle('collapsed');
  document.getElementById('scanned-arrow').textContent = panel.classList.contains('collapsed') ? '▲' : '▼';
}

function renderScannedList() {
  document.getElementById('scanned-count').textContent = _scannedBooks.length;
  document.getElementById('finish-count').textContent  = _scannedBooks.length;
  document.getElementById('finish-btn').disabled = _scannedBooks.length === 0;
  document.getElementById('scanned-list').innerHTML = _scannedBooks.map((b, i) => `
    <div class="scanned-item">
      <div class="info">
        <div class="t">${b.title}</div>
        <div class="m">${[b.author, b.publisher].filter(Boolean).join(' / ') || 'ISBN ' + b.isbn}</div>
      </div>
      <button class="rm" onclick="removeScanned(${i})">✕</button>
    </div>`).join('');
}

function removeScanned(idx) {
  const removed = _scannedBooks.splice(idx, 1)[0];
  if (removed) _scannedISBNs.delete(removed.isbn);
  renderScannedList();
}

function addScannedBook(book) {
  if (_scannedISBNs.has(book.isbn)) {
    toast('이미 담겨있어요: ' + book.title, true);
    return;
  }
  _scannedISBNs.add(book.isbn);
  _scannedBooks.push(book);
  renderScannedList();
  document.getElementById('scanned-panel').classList.remove('collapsed');
  document.getElementById('scanned-arrow').textContent = '▼';
  toast('✅ 담김: ' + book.title);
}

// ── 카메라 스캔 ────────────────────────────────────────────────────────────
let zxingControls = null;

function loadZXingAndStart() {
  const script = document.createElement('script');
  script.src = 'https://unpkg.com/@zxing/library@latest/umd/index.min.js';
  script.onload  = startScan;
  script.onerror = () => toast('라이브러리 로드 실패 — 네트워크 확인', true);
  document.head.appendChild(script);
}

let _lastDecoded = '';
let _decodeLock  = false;

function startScan() {
  const video = document.getElementById('video');
  const hints = new Map();
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8, ZXing.BarcodeFormat.CODE_128,
  ]);
  const codeReader = new ZXing.BrowserMultiFormatReader(hints, { delayBetweenScanAttempts: 150 });
  codeReader.decodeFromConstraints(
    { video: { facingMode: { exact: 'environment' }, width:{min:640,ideal:1920,max:1920}, height:{min:480,ideal:1080,max:1080}, focusMode:'continuous' } },
    video,
    (result) => {
      if (!result || _decodeLock) return;
      const val = result.getText().replace(/-/g, '');
      if ((val.length === 13 || val.length === 10) && val !== _lastDecoded) {
        _lastDecoded = val;
        handleScannedISBN(val);
      }
    }
  ).then(ctrl => { zxingControls = ctrl; })
   .catch(e => toast('카메라 오류: ' + (e.name === 'NotAllowedError' ? '카메라 권한을 허용해주세요' : e.message), true));
}

async function handleScannedISBN(isbn) {
  _decodeLock = true;
  await lookupAndAdd(isbn);
  setTimeout(() => { _decodeLock = false; }, 800); // 연속 오인식 방지용 짧은 쿨다운
}

// ── 수동 입력 ──────────────────────────────────────────────────────────────
function toggleManualEntry() {
  const row = document.getElementById('manual-input-row');
  const show = row.style.display !== 'flex';
  row.style.display = show ? 'flex' : 'none';
  document.getElementById('manual-arrow').textContent = show ? '▴' : '▾';
  if (show) document.getElementById('manual-isbn').focus();
}

function submitManualISBN() {
  const input = document.getElementById('manual-isbn');
  const val = input.value.replace(/[^0-9]/g, '');
  if (val.length !== 13 && val.length !== 10) {
    toast('ISBN은 10자리 또는 13자리 숫자예요', true);
    return;
  }
  input.value = '';
  lookupAndAdd(val);
}
document.getElementById('manual-isbn').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); submitManualISBN(); }
});

// ── 조회 (로컬 DB 우선, 알라딘 폴백) → 목록에 추가 ───────────────────────────
async function lookupAndAdd(isbn) {
  if (_scannedISBNs.has(isbn)) { toast('이미 담겨있어요', true); return; }

  if (_isbnDB && Object.keys(_isbnDB).length > 0) {
    const local = _isbnDB[isbn] || _isbnDB[isbn.slice(-10)];
    if (local && local.title) {
      addScannedBook({ isbn, title: local.title, author: local.author||'', publisher: local.publisher||'', stage:'', pageCount:null });
      return;
    }
  }
  toast('📚 조회 중...');
  _lookupAladinJSONP(isbn);
}

function _lookupAladinJSONP(isbn) {
  const cbName = 'aladin_cb_' + Date.now();
  let done = false;

  window[cbName] = function(success, data) {
    done = true; cleanup();
    if (success && data && data.item && data.item.length > 0) {
      const item = data.item[0];
      const book = {
        isbn,
        title:     (item.title || '').replace(/\s*-\s*.*$/, '').trim(),
        author:    (item.author || '').split('(')[0].trim(),
        publisher: (item.publisher || '').trim(),
        stage: '',
        pageCount: (item.subInfo && item.subInfo.itemPage) ? Number(item.subInfo.itemPage) : null
      };
      if (!book.title) { toast('책 정보를 찾을 수 없어요 (ISBN: ' + isbn + ')', true); return; }
      addScannedBook(book);
    } else {
      toast('책 정보를 찾을 수 없어요 (ISBN: ' + isbn + ')', true);
    }
  };
  const s = document.createElement('script');
  s.id  = 'aladin-jsonp';
  s.src = 'https://www.aladin.co.kr/ttb/api/ItemLookUp.aspx'
    + '?ttbkey=' + ALADIN_KEY + '&itemIdType=ISBN13&ItemId=' + isbn
    + '&output=js&Version=20131101&OptResult=subInfo&CallBack=' + cbName;
  s.onerror = function() {
    if (done) return; cleanup();
    toast('조회 실패 (ISBN: ' + isbn + ')', true);
  };
  const timeout = setTimeout(() => {
    if (done) return; cleanup();
    toast('조회 시간 초과 (ISBN: ' + isbn + ')', true);
  }, 5000);
  function cleanup() {
    clearTimeout(timeout);
    delete window[cbName];
    const old = document.getElementById('aladin-jsonp');
    if (old) old.parentNode.removeChild(old);
  }
  document.head.appendChild(s);
}

// ── 완료 → 본체 앱으로 일괄 전달 ──────────────────────────────────────────────
function finishSession() {
  if (!_scannedBooks.length) return;
  const payload = {
    type: 'BOOKS_BATCH_SCANNED',
    books: _scannedBooks,
    readers: [..._selectedReaders],
    date: _sessionDate
  };
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage(payload, '*');
    window.close();
  } else {
    toast('앱 창을 찾을 수 없어요. 이 탭을 닫고 앱에서 확인해주세요.', true);
  }
}

function closeScanner() {
  if (zxingControls) { try { zxingControls.stop(); } catch(e) {} }
  if (_scannedBooks.length > 0) {
    if (!confirm(_scannedBooks.length + '권이 아직 등록 안 됐어요. 그냥 나가시겠어요?')) return;
  }
  if (callback) { window.location.href = decodeURIComponent(callback); }
  else if (window.opener) { window.close(); }
  else { history.back(); }
}
</script>

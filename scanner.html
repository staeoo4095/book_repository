<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ISBN 바코드 스캔</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#fff; font-family:-apple-system,sans-serif;
       height:100vh; display:flex; flex-direction:column; overflow:hidden; }

#header {
  position:fixed; top:0; left:0; right:0; z-index:10;
  padding:16px 20px;
  background:linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
  display:flex; justify-content:space-between; align-items:center;
}
#header span { font-size:16px; font-weight:600; }
#close-btn {
  background:rgba(255,255,255,0.2); border:none; color:#fff;
  border-radius:50%; width:36px; height:36px;
  font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
}

video {
  width:100%; height:100vh; object-fit:cover; display:block;
}

#overlay {
  position:fixed; inset:0; pointer-events:none;
  display:flex; align-items:center; justify-content:center;
}
#scan-box {
  width:75%; max-width:300px; height:120px;
  border:2px solid rgba(255,255,255,0.9); border-radius:10px;
  box-shadow:0 0 0 9999px rgba(0,0,0,0.55);
  position:relative; margin-top:-60px;
}
#scan-line {
  position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(to right, transparent, #5DCAA5, transparent);
  animation:scan 2s linear infinite;
}
@keyframes scan {
  0%   { top:0; }
  100% { top:100%; }
}

#status {
  position:fixed; bottom:80px; left:0; right:0;
  text-align:center; font-size:13px; color:rgba(255,255,255,0.8);
  padding:0 20px;
}

#db-status {
  position:fixed; top:60px; left:0; right:0;
  text-align:center; font-size:11px; color:rgba(93,202,165,0.9);
  padding:0 20px;
}

#result {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(15,110,86,0.95); padding:20px;
  transform:translateY(100%); transition:transform 0.3s;
  border-radius:16px 16px 0 0;
}
#result.show { transform:translateY(0); }
#result-title { font-size:15px; font-weight:600; margin-bottom:4px; }
#result-isbn  { font-size:12px; opacity:0.7; margin-bottom:14px; white-space:pre-line; }
#result-btn {
  width:100%; padding:12px; background:#fff; color:#0F6E56;
  border:none; border-radius:10px; font-size:15px; font-weight:700;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="header">
  <span>📷 ISBN 바코드 스캔</span>
  <button id="close-btn" onclick="closeScanner()">✕</button>
</div>

<div id="db-status"></div>

<video id="video" playsinline autoplay muted></video>

<div id="overlay">
  <div id="scan-box">
    <div id="scan-line"></div>
  </div>
</div>

<div id="status">바코드를 사각형 안에 천천히 맞춰주세요<br><span style="font-size:11px;opacity:0.6;">밝은 곳에서 / 바코드 전체가 보이게 / 살짝 기울여도 됩니다</span></div>

<div id="result">
  <div id="result-title"></div>
  <div id="result-isbn"></div>
  <button id="result-btn" onclick="confirmScan()">이 책으로 등록하기</button>
</div>

<script>
const params   = new URLSearchParams(window.location.search);
const callback = params.get('callback') || '';
const ALADIN_KEY  = 'ttbstaeoo1907001';
const ISBN_DB_URL = 'https://staeoo4095.github.io/book_repository/isbn_db.json';

// ── IndexedDB 캐싱 ────────────────────────────────────────────────────────
// isbn_db.json을 새로 만들어서 GitHub에 다시 올릴 때마다 이 숫자를 올려주세요.
// 그러면 이미 캐시를 갖고 있는 사용자들도 자동으로 새 DB를 재다운로드합니다.
const ISBN_DB_VERSION = 2;
const IDB_NAME  = 'isbn_cache_db';
const IDB_STORE = 'kv';

function idbOpen() {
  return new Promise((resolve, reject) => {
    if (!('indexedDB' in window)) { reject(new Error('IndexedDB 미지원')); return; }
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => { req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

function idbGet(key) {
  return idbOpen().then(db => new Promise((resolve, reject) => {
    const tx  = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  }));
}

function idbSet(key, value) {
  return idbOpen().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror    = () => reject(tx.error);
  }));
}

// 로컬 ISBN DB (메모리 캐시 + IndexedDB 영구 캐시)
let _isbnDB        = null;
let _isbnDBLoading = false;

async function preloadISBNDB() {
  if (_isbnDB || _isbnDBLoading) return;
  _isbnDBLoading = true;
  const statusEl = document.getElementById('db-status');

  try {
    const cachedVersion = await idbGet('version');
    if (cachedVersion === ISBN_DB_VERSION) {
      const cachedData = await idbGet('data');
      if (cachedData) {
        _isbnDB = cachedData;
        console.log('ISBN DB 캐시 로드 (네트워크 없음):', Object.keys(_isbnDB).length + '권');
        _isbnDBLoading = false;
        return;
      }
    }

    // 캐시 없음 or 버전 다름 -> 새로 다운로드
    if (statusEl) statusEl.textContent = '📚 도서 DB 준비 중... (최초 1회, 잠시만요)';
    console.log('ISBN DB 다운로드 시작...');
    const resp = await fetch(ISBN_DB_URL);
    const data = await resp.json();
    _isbnDB = data;
    console.log('ISBN DB 다운로드 완료:', Object.keys(data).length + '권');
    if (statusEl) { statusEl.textContent = ''; }

    // 백그라운드로 IndexedDB에 저장 (실패해도 스캔 자체엔 지장 없음)
    idbSet('data', data)
      .then(() => idbSet('version', ISBN_DB_VERSION))
      .catch(e => console.warn('IndexedDB 저장 실패:', e.message));

  } catch (e) {
    console.warn('ISBN DB 로드 실패, 알라딘 API만 사용:', e.message);
    _isbnDB = {};
    if (statusEl) statusEl.textContent = '';
  } finally {
    _isbnDBLoading = false;
  }
}

// 페이지 로드 즉시 DB 미리 로드
preloadISBNDB();

let detectedISBN = '';
let bookInfo     = null;
let zxingControls = null;

// ZXing 로드
const script = document.createElement('script');
script.src = 'https://unpkg.com/@zxing/library@latest/umd/index.min.js';
script.onload  = startScan;
script.onerror = () => { document.getElementById('status').textContent = '라이브러리 로드 실패. 네트워크를 확인해주세요.'; };
document.head.appendChild(script);

function startScan() {
  const video = document.getElementById('video');
  const hints = new Map();
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.EAN_13,
    ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.CODE_128,
  ]);
  const codeReader = new ZXing.BrowserMultiFormatReader(hints, {
    delayBetweenScanAttempts: 150
  });
  codeReader.decodeFromConstraints(
    {
      video: {
        facingMode: { exact: 'environment' },
        width:  { min: 640, ideal: 1920, max: 1920 },
        height: { min: 480, ideal: 1080, max: 1080 },
        focusMode: 'continuous'
      }
    },
    video,
    (result, err) => {
      if (!result) return;
      const val = result.getText().replace(/-/g, '');
      if ((val.length === 13 || val.length === 10) && val !== detectedISBN) {
        detectedISBN = val;
        lookupISBNDirect(val);
      }
    }
  ).then(ctrl => {
    zxingControls = ctrl;
  }).catch(e => {
    document.getElementById('status').textContent =
      '카메라 오류: ' + e.name + ' — ' +
      (e.name === 'NotAllowedError' ? '카메라 권한을 허용해주세요.' : e.message);
  });
}

// ── 로컬 DB 우선 조회, 없으면 알라딘 JSONP 폴백 ──────────────────────────────
function lookupISBNDirect(isbn) {
  document.getElementById('status').textContent = '📚 책 정보 조회 중...';
  document.getElementById('result-title').textContent = '조회 중...';
  document.getElementById('result-isbn').textContent  = 'ISBN: ' + isbn;
  document.getElementById('result').classList.add('show');
  document.getElementById('result-btn').disabled = true;

  // 1. 로컬 DB에서 먼저 검색 (즉시, 네트워크 없음)
  if (_isbnDB && Object.keys(_isbnDB).length > 0) {
    const local = _isbnDB[isbn] || _isbnDB[isbn.slice(-10)];
    if (local) {
      bookInfo = {
        isbn,
        title:     local.title     || '',
        author:    local.author    || '',
        publisher: local.publisher || '',
        stage:     ''
      };
      showBookResult(bookInfo);
      return; // 알라딘 API 호출 불필요
    }
  }

  // 2. 로컬 DB에 없으면 알라딘 JSONP 폴백
  _lookupAladinJSONP(isbn);
}

function _lookupAladinJSONP(isbn) {
  const cbName = 'aladin_cb_' + Date.now();
  let done = false;

  window[cbName] = function(success, data) {
    done = true;
    cleanup();
    if (success && data && data.item && data.item.length > 0) {
      const item = data.item[0];
      bookInfo = {
        isbn,
        title:     (item.title     || '').replace(/\s*-\s*.*$/, '').trim(),
        author:    (item.author    || '').split('(')[0].trim(),
        publisher: (item.publisher || '').trim(),
        stage:     ''
      };
    } else {
      bookInfo = { isbn, title: '(정보 없음)', author: '', publisher: '', stage: '' };
    }
    showBookResult(bookInfo);
  };

  const s = document.createElement('script');
  s.id  = 'aladin-jsonp';
  s.src = 'https://www.aladin.co.kr/ttb/api/ItemLookUp.aspx'
    + '?ttbkey=' + ALADIN_KEY
    + '&itemIdType=ISBN13&ItemId=' + isbn
    + '&output=js&Version=20131101&CallBack=' + cbName;
  s.onerror = function() {
    if (done) return;
    cleanup();
    bookInfo = { isbn, title: '(조회 실패)', author: '', publisher: '', stage: '' };
    showBookResult(bookInfo);
  };

  const timeout = setTimeout(() => {
    if (done) return;
    cleanup();
    bookInfo = { isbn, title: '(조회 시간 초과)', author: '', publisher: '', stage: '' };
    showBookResult(bookInfo);
  }, 5000);

  function cleanup() {
    clearTimeout(timeout);
    delete window[cbName];
    const old = document.getElementById('aladin-jsonp');
    if (old) old.parentNode.removeChild(old);
  }

  document.head.appendChild(s);
}

function showBookResult(book) {
  document.getElementById('result-title').textContent = book.title;
  document.getElementById('result-isbn').textContent  =
    (book.author ? book.author + ' / ' : '') +
    (book.publisher ? book.publisher : '') +
    '\nISBN: ' + book.isbn;
  document.getElementById('result-btn').disabled = false;
}

function confirmScan() {
  if (!bookInfo && !detectedISBN) return;
  const payload = bookInfo
    ? { type: 'ISBN_SCANNED', isbn: bookInfo.isbn, title: bookInfo.title,
        author: bookInfo.author, publisher: bookInfo.publisher, stage: bookInfo.stage }
    : { type: 'ISBN_SCANNED', isbn: detectedISBN };

  if (window.opener && !window.opener.closed) {
    window.opener.postMessage(payload, '*');
    window.close();
  } else {
    if (!callback) {
      document.getElementById('status').textContent = '등록 완료! 앱으로 돌아가세요.';
      return;
    }
    const url = decodeURIComponent(callback) + '?isbn=' + (bookInfo ? bookInfo.isbn : detectedISBN);
    window.location.href = url;
  }
}

function closeScanner() {
  if (zxingControls) { try { zxingControls.stop(); } catch(e) {} }
  if (callback) {
    window.location.href = decodeURIComponent(callback);
  } else {
    window.close();
  }
}
</script>
</body>
</html>
